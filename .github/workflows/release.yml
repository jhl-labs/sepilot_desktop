name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Extension 패키징 (공통, 한 번만 실행)
  build-extensions:
    name: Build Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build and package extensions
        run: |
          pnpm run build:extensions
          pnpm run package:extensions

      - name: Upload extensions artifact
        uses: actions/upload-artifact@v7
        with:
          name: extensions-sepx
          path: extensions/*.sepx

  build:
    name: Build ${{ matrix.os_name }}
    needs: build-extensions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_name: Windows
            build_command: pnpm build:win
            portable_command: pnpm exec electron-builder --win portable --config electron-builder.portable.json
            artifact_path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
            artifact_name: windows-build
            cache_paths: |
              ~/AppData/Local/electron/Cache
              ~/AppData/Local/electron-builder/Cache
          - os: macos-latest
            os_name: macOS
            build_command: pnpm build:mac
            portable_command: ''
            artifact_path: |
              release/*.dmg
              release/*.dmg.blockmap
              release/*.zip
              release/latest-mac.yml
            artifact_name: macos-build
            cache_paths: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder
          - os: ubuntu-latest
            os_name: Linux
            build_command: pnpm build:linux
            portable_command: ''
            artifact_path: |
              release/*.AppImage
              release/*.snap
              release/*.deb
              release/*.rpm
              release/latest-linux.yml
            artifact_name: linux-build
            cache_paths: |
              ~/.cache/electron
              ~/.cache/electron-builder

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup multi-layer cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.STORE_PATH }}
            ${{ matrix.cache_paths }}
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-deps-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-deps-

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            out
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'next.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Cache TypeScript build
        uses: actions/cache@v5
        with:
          path: |
            dist
            **/*.tsbuildinfo
          key: ${{ runner.os }}-typescript-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-typescript-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-typescript-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools snapd

      - name: Generate application icons
        run: pnpm build:icon

      - name: Build for ${{ matrix.os_name }}
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: ${{ matrix.build_command }}
        env:
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          CI: true
          ELECTRON_GET_USE_PROXY: true
          GLOBAL_AGENT_HTTPS_PROXY: ''

      - name: Build portable (Windows only)
        if: matrix.os == 'windows-latest' && matrix.portable_command != ''
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: ${{ matrix.portable_command }}
        env:
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          CI: true

      - name: Upload ${{ matrix.os_name }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create Release
    needs: [build, build-extensions]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create extensions zip bundle
        run: |
          cd artifacts/extensions-sepx
          zip -r ../SEPilot-Extensions.zip *.sepx
          cd ..
          echo "📦 Extensions bundle created"
          ls -la SEPilot-Extensions.zip

      - name: Generate checksums
        run: |
          cd artifacts

          echo "📋 Generating checksums for all platforms..."

          # Windows checksums
          if [ -d "windows-build" ]; then
            cd windows-build
            sha256sum *.exe > SHA256SUMS-windows.txt 2>/dev/null || true
            cd ..
          fi

          # macOS checksums
          if [ -d "macos-build" ]; then
            cd macos-build
            sha256sum *.dmg *.zip > SHA256SUMS-macos.txt 2>/dev/null || true
            cd ..
          fi

          # Linux checksums
          if [ -d "linux-build" ]; then
            cd linux-build
            sha256sum *.AppImage *.deb *.rpm > SHA256SUMS-linux.txt 2>/dev/null || true
            cd ..
          fi

          # Extensions checksum
          if [ -d "extensions-sepx" ]; then
            cd extensions-sepx
            sha256sum *.sepx > SHA256SUMS-extensions.txt 2>/dev/null || true
            cd ..
          fi

          echo "✅ Checksums generated"
          cat */SHA256SUMS-*.txt 2>/dev/null || echo "No checksums found"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/**/*.exe,artifacts/**/*.exe.blockmap,artifacts/**/*.dmg,artifacts/**/*.dmg.blockmap,artifacts/**/*.zip,artifacts/*.zip,artifacts/**/*.AppImage,artifacts/**/*.snap,artifacts/**/*.deb,artifacts/**/*.rpm,artifacts/**/*.yml,artifacts/**/*.sepx,artifacts/**/SHA256SUMS-*.txt"
          draft: false
          prerelease: false
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: false
          omitNameDuringUpdate: false
          makeLatest: true
          body: |
            ## 🎉 새 버전이 출시되었습니다!

            ### 📥 설치 방법

            **Windows 사용자:**

            **방법 1: 설치 프로그램 (권장)**
            1. `SEPilot-Setup-*.exe` 파일 다운로드
            2. 실행 시 Windows SmartScreen 경고가 표시될 수 있습니다
            3. "추가 정보" → "실행" 클릭하여 설치 진행

            **방법 2: Portable + Extensions (설치 없이 실행)**
            1. `SEPilot Desktop *.exe` (Portable) 다운로드
            2. `SEPilot-Extensions.zip` 또는 개별 `.sepx` 파일 다운로드
            3. 원하는 폴더에 exe 파일 배치
            4. 같은 폴더에 `extensions/` 폴더 생성
            5. `.sepx` 파일들을 `extensions/` 폴더에 배치
            6. exe 실행

            ```
            📁 MyFolder/
            ├── SEPilot Desktop 0.9.1.exe
            └── extensions/
                ├── editor-0.1.0.sepx
                ├── terminal-0.1.0.sepx
                ├── browser-1.0.0.sepx
                └── ...
            ```

            **macOS 사용자:**
            1. `SEPilot-*.dmg` 파일 다운로드
            2. DMG 파일을 열고 Applications 폴더로 드래그
            3. 처음 실행 시 "확인되지 않은 개발자" 경고가 표시되면 시스템 환경설정 → 보안 및 개인 정보 보호에서 "확인 없이 열기" 클릭

            **Linux 사용자:**
            - **AppImage**: `SEPilot-*.AppImage` 파일을 다운로드하고 실행 권한 부여 후 실행
            - **Debian/Ubuntu**: `SEPilot-*.deb` 파일 다운로드 후 `sudo dpkg -i SEPilot-*.deb` 실행
            - **Fedora/RHEL**: `SEPilot-*.rpm` 파일 다운로드 후 `sudo rpm -i SEPilot-*.rpm` 실행
            - **Snap**: `SEPilot-*.snap` 파일 다운로드 후 `sudo snap install SEPilot-*.snap --dangerous` 실행

            ### 🧩 Extensions

            다음 Extension들이 포함되어 있습니다:
            - `editor` - 코드 에디터 (AI 코딩 에이전트)
            - `terminal` - 터미널 (AI 명령어 지원)
            - `browser` - 웹 브라우저 (AI 브라우징)
            - `architect` - 아키텍처 설계
            - `presentation` - 프레젠테이션 생성
            - `github-actions` - GitHub Actions 관리
            - `github-pr-review` - PR 리뷰 지원
            - `github-project` - GitHub Project 관리

            ### 🔒 보안 검증

            **SHA256 체크섬 확인:**
            ```bash
            # Windows
            sha256sum -c SHA256SUMS-windows.txt

            # macOS
            shasum -a 256 -c SHA256SUMS-macos.txt

            # Linux
            sha256sum -c SHA256SUMS-linux.txt

            # Extensions
            sha256sum -c SHA256SUMS-extensions.txt
            ```

            ### ⚙️ 자동 업데이트
            설치 버전에서는 앱 내 자동 업데이트가 지원됩니다.
            Portable 버전은 수동으로 업데이트해야 합니다.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
